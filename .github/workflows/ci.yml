name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & Test
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Run unit tests
        run: |
          xcodebuild test \
            -scheme TokenUsageMonitor \
            -destination 'platform=macOS' \
            -only-testing:TokenUsageMonitorTests \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | grep -E "(Test Case|error:|Executed|FAILED|PASSED)" \
            || true

      - name: Verify app builds
        run: |
          xcodebuild build \
            -scheme TokenUsageMonitor \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | tail -5
